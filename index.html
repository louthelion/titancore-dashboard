<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Dashboard Login</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#050505;
      --green:#18c25c;
      --gold:#d4af37;
      --white:#ffffff;
      --muted:#bdbdbd;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      padding:16px 10px;
    }

    .page-title{
      width:min(1180px, 98%);
      margin:0 auto 14px;
      font-size:clamp(1.8rem, 4vw, 3.2rem);
      font-weight:800;
      color:var(--white);
      text-align:left;
    }

    .wrap{
      width:min(1180px, 98%);
      margin:0 auto;
      border:2px solid var(--green);
      background:var(--panel);
      display:grid;
      grid-template-columns:44% 56%;
      min-height:420px;
    }

    .left{
      padding:24px 18px 20px;
      border-right:2px solid var(--green);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .login-title{
      font-size:clamp(1.4rem, 3vw, 2.2rem);
      font-weight:800;
      color:var(--gold);
      margin-bottom:18px;
      line-height:1;
    }

    .field{
      margin-bottom:16px;
    }

    .field label{
      display:block;
      font-size:.95rem;
      font-weight:700;
      color:var(--white);
      margin-bottom:7px;
    }

    .field input{
      width:100%;
      padding:14px 14px;
      border:2px solid var(--green);
      border-radius:14px;
      background:#000000;
      color:var(--white);
      font-size:.95rem;
      outline:none;
    }

    .field input::placeholder{
      color:#7f7f7f;
    }

    .field input:focus{
      border-color:var(--gold);
    }

    .login-btn{
      width:100%;
      margin-top:4px;
      padding:15px 14px;
      border:none;
      border-radius:36px;
      background:var(--gold);
      color:#000000;
      font-size:1rem;
      font-weight:800;
      cursor:pointer;
    }

    .login-btn:hover{
      background:var(--green);
      color:#000;
    }

    .helper{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      font-size:.92rem;
      line-height:1.4;
    }

    .helper a{
      color:var(--gold);
      text-decoration:none;
    }

    .helper a:hover{
      text-decoration:underline;
    }

    .right{
      padding:24px 18px 20px;
      display:flex;
      align-items:center;
    }

    .desc{
      max-width:100%;
      font-size:1rem;
      line-height:1.7;
      color:var(--white);
    }

    .desc .small-note{
      display:block;
      margin-top:18px;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.5;
    }

    /* keep 2 columns on phone */
    @media (max-width:900px){
      .wrap{
        grid-template-columns:46% 54%;
        min-height:auto;
      }

      .left{
        border-right:2px solid var(--green);
        border-bottom:none;
        padding:18px 12px 16px;
      }

      .right{
        padding:18px 12px 16px;
      }

      .page-title{
        font-size:2rem;
      }

      .login-title{
        font-size:1.8rem;
        margin-bottom:14px;
      }

      .field label{
        font-size:.9rem;
      }

      .field input{
        padding:12px 12px;
        font-size:.9rem;
      }

      .login-btn{
        padding:13px 12px;
        font-size:.95rem;
      }

      .desc{
        font-size:.92rem;
        line-height:1.55;
      }

      .helper{
        font-size:.84rem;
      }
    }

    @media (max-width:560px){
      .wrap{
        grid-template-columns:48% 52%;
      }

      .page-title{
        font-size:1.65rem;
      }

      .login-title{
        font-size:1.55rem;
      }

      .field input{
        border-radius:12px;
      }

      .login-btn{
        border-radius:30px;
      }

      .desc{
        font-size:.88rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-title">Central Dashboard</div>

  <div class="wrap">
    <div class="left">
      <div class="login-title">Login</div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@titancoreholdings.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="helper">
          <a href="https://passwordreset.microsoftonline.com/" target="_blank" rel="noopener">Forgot password?</a>
          <span>•</span>
          <a href="mailto:helpdesk@titancoreholdings.com?subject=Need%20help%20with%20dashboard%20email">Forgot email?</a>
        </div>
      </form>
    </div>

    <div class="right">
      <div class="desc">
        Multi-company command center for reporting, oversight, tax review,
        operational review, finance visibility, and executive access across
        the full TitanCore network.

        <span class="small-note">
          Sign in to continue to the Central Dashboard.
        </span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){
        return;
      }

      window.location.href = "index.html";
    });
  </script>
</body>
</html>
