<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Dashboard Login</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#050505;
      --green:#18c25c;
      --gold:#d4af37;
      --white:#ffffff;
      --muted:#bdbdbd;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      padding:24px 18px;
    }

    .page-title{
      width:min(1200px, 96%);
      margin:0 auto 18px;
      font-size:clamp(2.2rem, 5vw, 4rem);
      font-weight:800;
      color:var(--white);
      text-align:left;
    }

    .wrap{
      width:min(1200px, 96%);
      margin:0 auto;
      border:2px solid var(--green);
      background:var(--panel);
      display:grid;
      grid-template-columns:1fr 1fr;
      min-height:680px;
    }

    .left{
      padding:46px 34px 34px;
      border-right:2px solid var(--green);
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .login-title{
      font-size:clamp(2rem, 3.5vw, 3rem);
      font-weight:800;
      color:var(--gold);
      margin-bottom:34px;
      line-height:1;
    }

    .field{
      margin-bottom:24px;
    }

    .field label{
      display:block;
      font-size:1.05rem;
      font-weight:700;
      color:var(--white);
      margin-bottom:10px;
    }

    .field input{
      width:100%;
      padding:19px 17px;
      border:2px solid var(--green);
      border-radius:16px;
      background:#000000;
      color:var(--white);
      font-size:1rem;
      outline:none;
    }

    .field input::placeholder{
      color:#7f7f7f;
    }

    .field input:focus{
      border-color:var(--gold);
    }

    .login-btn{
      width:100%;
      margin-top:8px;
      padding:20px 16px;
      border:none;
      border-radius:42px;
      background:var(--gold);
      color:#000000;
      font-size:1.15rem;
      font-weight:800;
      cursor:pointer;
    }

    .login-btn:hover{
      background:var(--green);
      color:#000;
    }

    .helper{
      margin-top:20px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      font-size:1rem;
    }

    .helper a{
      color:var(--gold);
      text-decoration:none;
    }

    .helper a:hover{
      text-decoration:underline;
    }

    .right{
      padding:46px 34px 34px;
      display:flex;
      align-items:center;
    }

    .desc{
      max-width:560px;
      font-size:1.18rem;
      line-height:1.8;
      color:var(--white);
    }

    .desc .small-note{
      display:block;
      margin-top:24px;
      color:var(--muted);
      font-size:1rem;
      line-height:1.6;
    }

    @media (max-width:900px){
      .wrap{
        grid-template-columns:1fr;
      }

      .left{
        border-right:none;
        border-bottom:2px solid var(--green);
      }

      .right{
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page-title">Central Dashboard</div>

  <div class="wrap">
    <div class="left">
      <div class="login-title">Login</div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="name@titancoreholdings.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

        <div class="helper">
          <a href="https://passwordreset.microsoftonline.com/" target="_blank" rel="noopener">Forgot password?</a>
          <span>•</span>
          <a href="mailto:helpdesk@titancoreholdings.com?subject=Need%20help%20with%20dashboard%20email">Forgot email?</a>
        </div>
      </form>
    </div>

    <div class="right">
      <div class="desc">
        Multi-company command center for reporting, oversight, tax review,
        operational review, finance visibility, and executive access across
        the full TitanCore network.

        <span class="small-note">
          Sign in to continue to the Central Dashboard.
        </span>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if(!email || !password){
        return;
      }

      window.location.href = "index.html";
    });
  </script>
</body>
</html>
