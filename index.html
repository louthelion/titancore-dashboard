<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Dashboard Login</title>
  <style>
    :root{--bg:#000;--panel:#0e0e0e;--border:#d4af37;--accent:#18c25c;--txt:#f1df9a}
    *{box-sizing:border-box;margin:0;padding:0;font-family:Arial, sans-serif}
    body{min-height:100vh;display:flex;justify-content:center;align-items:center;
         background:radial-gradient(circle at top,rgba(24,194,92,.08),transparent 25%),#000}
    .card{width:min(440px,100%);background:var(--panel);border:1px solid var(--border);
          border-radius:28px;padding:32px 28px 24px;box-shadow:0 0 26px rgba(24,194,92,.10)}
    .logo{width:88px;height:88px;margin:0 auto 22px;border-radius:22px;border:1px solid var(--border);
          display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:2rem;font-weight:700}
    h1{color:var(--accent);text-align:center;font-size:1.8rem;margin-bottom:24px}
    label{display:block;margin-bottom:6px;color:var(--txt);font-size:.94rem}
    input{width:100%;padding:14px;border:1px solid var(--border);border-radius:16px;background:#090909;
          color:#fff;font-size:1rem;margin-bottom:16px}
    input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(24,194,92,.15)}
    button{width:100%;padding:14px;border:none;border-radius:999px;background:var(--border);
           color:#000;font-weight:bold;font-size:1rem;cursor:pointer;transition:.2s}
    button:hover{background:var(--accent);color:#fff}
    .links{margin-top:14px;text-align:center;font-size:.88rem}
    .links a{color:var(--accent);text-decoration:none;margin:0 6px}
    .links a:hover{text-decoration:underline}
    .msg{margin-top:16px;text-align:center;color:var(--accent);min-height:20px;font-size:.9rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CD</div>
    <h1>Central&nbsp;Dashboard</h1>

    <form id="login">
      <label for="user">Email</label>
      <input id="user" type="email" placeholder="you@company.com" autocomplete="username" />

      <label for="pass">Password</label>
      <input id="pass" type="password" placeholder="Password" autocomplete="current-password" />

      <button type="submit">Login</button>

      <div class="links">
        <a href="#">Forgot email?</a> • <a href="#">Forgot password?</a>
      </div>

      <div class="msg" id="msg"></div>
    </form>
  </div>

  <script>
    const dashboardPage = "central-dashboard.html";          // real dashboard file

    document.getElementById("login").addEventListener("submit",e=>{
      e.preventDefault();
      const email=document.getElementById("user").value.trim();
      const pass =document.getElementById("pass").value.trim();
      const msg  =document.getElementById("msg");
      if(!email||!pass){msg.textContent="Enter email and password.";return;}
      msg.textContent="Signing in…";
      setTimeout(()=>location.href=dashboardPage,600);        // fake redirect
    });
  </script>
</body>
</html>
