<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central Dashboard Login</title>
  <style>
    :root{
      --bg:#000000;
      --panel:#060606;
      --green:#18c25c;
      --gold:#d4af37;
      --white:#ffffff;
      --muted:#bdbdbd;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--white);
      min-height:100vh;
      padding:20px 14px;
    }

    .page{
      width:min(1220px, 100%);
      margin:0 auto;
    }

    .page-title{
      font-size:clamp(2rem, 4vw, 3.4rem);
      font-weight:800;
      color:var(--green);
      margin-bottom:18px;
    }

    .shell{
      border:2px solid var(--green);
      border-radius:22px;
      background:var(--panel);
      overflow-x:auto;
    }

    .shell-inner{
      min-width:820px;
      display:grid;
      grid-template-columns:360px 1fr;
      gap:36px;
      padding:30px 28px;
      align-items:center;
    }

    .left{
      padding:8px 4px;
    }

    .login-title{
      font-size:2.5rem;
      font-weight:800;
      color:var(--gold);
      margin-bottom:24px;
      line-height:1;
    }

    .field{
      margin-bottom:18px;
    }

    .field label{
      display:block;
      font-size:1rem;
      font-weight:700;
      color:var(--white);
      margin-bottom:8px;
    }

    .field input{
      width:100%;
      padding:16px 14px;
      border:2px solid var(--green);
      border-radius:16px;
      background:#000;
      color:#fff;
      font-size:1rem;
      outline:none;
    }

    .field input::placeholder{
      color:#7b7b7b;
    }

    .field input:focus{
      border-color:var(--gold);
    }

    .login-btn{
      width:100%;
      margin-top:8px;
      padding:17px 14px;
      border:none;
      border-radius:999px;
      background:var(--gold);
      color:#000;
      font-size:1.08rem;
      font-weight:800;
      cursor:pointer;
    }

    .login-btn:hover{
      background:var(--green);
      color:#000;
    }

    .helper{
      margin-top:16px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      font-size:.95rem;
    }

    .helper a{
      color:var(--gold);
      text-decoration:none;
    }

    .helper a:hover{
      text-decoration:underline;
    }

    .status{
      min-height:22px;
      margin-top:12px;
      color:var(--green);
      font-size:.92rem;
    }

    .right{
      padding:8px 4px;
    }

    .desc{
      font-size:1.12rem;
      line-height:1.8;
      color:var(--white);
      max-width:620px;
    }

    .desc .note{
      display:block;
      margin-top:20px;
      color:var(--muted);
      font-size:.98rem;
      line-height:1.6;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-title">Central Dashboard</div>

    <div class="shell">
      <div class="shell-inner">
        <div class="left">
          <div class="login-title">Login</div>

          <form id="loginForm">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="name@titancoreholdings.com" required>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="helper">
              <a href="https://passwordreset.microsoftonline.com/" target="_blank" rel="noopener">Forgot password?</a>
              <span>•</span>
              <a href="mailto:helpdesk@titancoreholdings.com?subject=Need%20help%20with%20dashboard%20email">Forgot email?</a>
            </div>

            <div class="status" id="status"></div>
          </form>
        </div>

        <div class="right">
          <div class="desc">
            Multi-company command center for reporting, oversight, tax review,
            operational review, finance visibility, and executive access across
            the full TitanCore network.

            <span class="note">
              Sign in to continue to the Central Dashboard.
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const status = document.getElementById("status");

      if(!email || !password){
        status.textContent = "Enter your email and password.";
        return;
      }

      status.textContent = "Opening dashboard...";

      setTimeout(function(){
        window.location.href = "central-dashboard.html";
      }, 300);
    });
  </script>
</body>
</html>
