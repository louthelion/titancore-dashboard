<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title><!-- COMPANY --> Dashboard Login</title>

<style>
/* ─── brand palette – change once per company ─────────────── */
:root{
  --accent: #18c25c;          /* green outline / form border   */
  --button: #d4af37;          /* gold button                   */
  --button-txt: #000;         /* text on button                */
  --bg: #000;                 /* page background               */
  --txt: #fff;                /* normal text colour            */
}
/* ─── reset & layout ───────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:var(--bg);color:var(--txt)}
.wrapper  {max-width:1024px;margin:0 auto;border:3px solid var(--accent);display:flex;min-height:100vh}
.left,.right{flex:1;padding:4rem 2rem}
.left {border-right:3px solid var(--accent);display:flex;flex-direction:column;gap:1.2rem}
h1      {font-size:clamp(2.1rem,5vw,3.5rem);line-height:1.05}
h2      {font-size:1.3rem;color:var(--button);}
input   {width:100%;padding:.9rem 1rem;border:2px solid var(--accent);border-radius:.4rem;background:transparent;color:var(--txt)}
input::placeholder{color:#666}
button  {width:100%;padding:1rem;border:none;border-radius:2rem;background:var(--button);color:var(--button-txt);font-weight:600;font-size:1.1rem;cursor:pointer}
button:hover{opacity:.9}
.hint   {font-size:.85rem;margin-top:.3rem}
.hint a {color:var(--button);text-decoration:none}
.hint a:hover{text-decoration:underline}
.right p{font-size:1.05rem;line-height:1.5;margin-bottom:1.3rem}

/* ─── mobile: panes stack ─────────────────────────────────── */
@media(max-width:680px){
 .wrapper{flex-direction:column}
 .left  {border-right:none;border-bottom:3px solid var(--accent)}
}
</style>
</head>
<body>

<!-- top banner (optional) -->
<!-- <div style="background:#111;color:#ccc;text-align:center;padding:.4rem">System notice …</div> -->

<div class="wrapper">

  <!-- left pane – form -->
  <section class="left">
     <h1><!-- COMPANY --> Dashboard</h1>
     <h2>SECURE LOGIN</h2>

     <form id="logForm">
        <label>Email</label>
        <input id="email"  type="email" placeholder="name@<!-- DOMAIN -->" required>

        <label style="margin-top:1rem">Password</label>
        <input id="pwd" type="password" placeholder="Password" required>

        <button>Login</button>

        <div class="hint">
          <a href="#">Forgot password?</a> • 
          <a href="#">Forgot email?</a>
        </div>
     </form>
  </section>

  <!-- right pane – company blurb -->
  <section class="right">
      <h1><!-- COMPANY LONG --></h1>
      <p><!-- 1-3 sentence description of the business / mission. --></p>
      <p style="font-size:.9rem;color:#bbb">Access is restricted to authorised staff and system administrators.</p>
  </section>

</div>

<!-- ─── temporary client-side redirect (replace later with MS-SSO) -->
<script>
document.getElementById('logForm').addEventListener('submit', e=>{
  e.preventDefault();
  const em = email.value.trim().toLowerCase();
  if(!em.endsWith('@<!-- DOMAIN -->')){alert('Use your company e-mail.');return;}
  window.location.href = '/<!-- REAL-DASHBOARD-FOLDER -->/index.html';
});
</script>
</body>
</html>
